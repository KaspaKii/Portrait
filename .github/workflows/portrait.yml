name: portrait

# Portrait language + compiler (portrait/portrait/) — its own Cargo workspace.
# Path-filtered so it only runs when the compiler changes.
on:
  push:
    branches: [main]
    paths:
      - 'portrait/**'
      - '.github/workflows/portrait.yml'
  pull_request:
    paths:
      - 'portrait/**'
      - '.github/workflows/portrait.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portrait/portrait
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install z3 (Lens discharges verification conditions via the z3 binary)
        run: sudo apt-get update && sudo apt-get install -y z3
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo build --workspace
      - run: cargo test --workspace
