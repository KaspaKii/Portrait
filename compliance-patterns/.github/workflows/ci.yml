name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all --check
        # Note: --all-features is intentionally omitted. The `wrpc` feature pulls
        # in a transitive `cc` dependency that currently fails to build against
        # stable Rust (upstream cc-1.2.63 issue, not library code). This mirrors
        # the local _harness/ci.sh gate. To be investigated before v0.2.
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo build --workspace
      - run: cargo test --workspace
